{% extends 'menu.html' %}
{% load static %}
{% block menu %}
    <form action="{% url 'registration' %}" method="post">
    {% csrf_token %}

    <table align="center" style="background: skyblue" width="480">
    <tr><th style="text-align: center;font-size: 40px" colspan="3">Register Here</th> </tr>
    <tr><th rowspan="9" style="text-align: center"><img src="{% static 'images/rr.png' %}" height="400"></th></tr>
    <tr><th><input type="text" placeholder="Enter Your Name" name="t1" required></th></tr>
    <tr><th><input type="text" placeholder="Enter Your Age" name="t2" required></th></tr>
    <tr><th><input type="text" placeholder="Enter Your Contact No" name="t3" required></th></tr>
    <tr><th>Gender<input type="radio" value="Male" name="t4" required>Male
    <input type="radio" value="Female" name="t4">Female
    <input type="radio" value="Others" name="t4">Others</th></tr>

    <tr><th><input type="text" placeholder="Enter Your Email" name="t5" required></th></tr>
    <tr><th><input type="text" placeholder="Enter User Name" name="t6" required></th></tr>
    <tr><th><input type="password" placeholder="Enter Your Password" name="t7" required></th></tr>
    <tr><th><button type="submit">Register</button> </th></tr>
    </table>
    </form>


    <div class="container" align="center" style="width: 150%;height: 100px">
    {% for x in messages %}
       <h2 style="text-align: center"> {{ x }} </h2>
    {% endfor %}
    </div>
{% endblock %}
