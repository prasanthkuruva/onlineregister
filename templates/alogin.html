{% extends 'menu.html'%}
{% load static %}
{% block menu %}
    <form method="post" action="{% url 'ahome' %}">
    {% csrf_token %}

    <table align="center" width="300" style="background: greenyellow ">
    <tr><th style="text-align: center" colspan="3"><h3>Admin Login Page</h3></th></tr>
    <tr><th rowspan="4"><img src="{% static 'images/Admin-icon.png' %}" width="600" height="300"></th></tr>
    <tr><th><input type="text" name="t1" placeholder="Enter User Name" required></th></tr>
    <tr><th><input type="password" name="t2" placeholder="Enter Password" required></th></tr>
        <tr><th><button type="submit">Login</button> </th></tr>
    </table>
    </form>
    {% for x in messages %}
        <h3 style="text-align: center">{{ x }}</h3>
    {% endfor %}
{% endblock %}
